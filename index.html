<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>phantom line Expense Submit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; overscroll-behavior-y: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }
    .animate-pop { animation: pop 0.25s ease-in-out; }

    /* 横スワイプ安定化：見た目は変えず、止まり方だけ強める */
    .expense-swipe-container {
      scroll-snap-type: x mandatory;
      overscroll-behavior-x: contain;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    .expense-swipe-card {
      scroll-snap-align: start;
      scroll-snap-stop: always;
    }

    @media (min-width: 1024px) {
      .expense-swipe-container {
        scroll-snap-type: none;
      }
    }
  </style>
</head>

<body class="bg-white font-sans text-slate-800 m-0 p-0 overflow-x-hidden">

  <!-- ロック画面 -->
  <div id="lockScreen" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center transition-opacity duration-500">
    <div class="flex flex-col items-center -mt-32">
      <h1 class="text-3xl font-serif tracking-widest text-slate-900 mb-4">phantom line</h1>
      <p class="text-xs font-bold tracking-[0.25em] text-slate-400 mb-14">EXPENSE SUBMIT</p>

      <div class="relative">
        <input
          type="password"
          id="passcodeInput"
          maxlength="4"
          oninput="checkAutoPasscode(this.value)"
          placeholder="••••"
          class="w-48 border-b border-slate-300 bg-transparent text-center text-3xl tracking-[0.5em] text-slate-700 focus:outline-none focus:border-slate-900 pb-2 transition-colors"
        />
        <p id="passcodeError" class="absolute top-full mt-4 w-full text-center text-[10px] text-red-400 font-bold tracking-widest opacity-0 transition-opacity">
          INCORRECT
        </p>
      </div>
    </div>
  </div>

  <!-- ヘッダー -->
  <header class="sticky top-0 z-30 bg-white/90 backdrop-blur-md px-3 py-1.5 border-b border-slate-200 shadow-sm">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div>
        <h1 class="text-xl font-serif tracking-widest text-slate-800 leading-tight">phantom line</h1>
        <p class="text-[10px] font-bold tracking-[0.25em] text-slate-400 leading-tight">EXPENSE SUBMIT</p>
      </div>
      <button onclick="resetAllCards()" class="text-[10px] font-bold text-slate-500 bg-slate-100 px-2.5 py-1.5 rounded-lg">
        全リセット
      </button>
    </div>
  </header>

  <!-- 一時通知 -->
  <div
    id="globalToast"
    class="fixed top-16 left-1/2 -translate-x-1/2 z-[80] hidden rounded-2xl border px-4 py-3 text-sm font-extrabold shadow-lg bg-white max-w-[92vw] text-center"
  ></div>

  <!-- メイン -->
  <main id="view_form" class="min-h-screen bg-slate-50 pb-8">
    <div class="max-w-7xl mx-auto p-3">

      <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-4 mb-3">
        <h2 class="font-extrabold text-lg text-slate-800 mb-1">経費提出</h2>
        <p class="text-xs text-slate-400 font-bold leading-relaxed">
          1カードにつき1経費です。スマホでは横スワイプ、PCでは3件を並べて入力できます。<br>
          送信中も他のカードは入力できます。
        </p>
      </div>


      <!-- 送信履歴 -->
      <section class="bg-white rounded-3xl shadow-sm border border-slate-200 p-3 mb-3">
        <button
          type="button"
          onclick="toggleSubmissionHistory()"
          class="w-full flex items-center justify-between gap-3 text-left"
        >
          <span>
            <span class="block text-[10px] font-black text-slate-400 tracking-widest">TODAY LOG</span>
            <span id="submissionHistorySummary" class="block text-sm font-extrabold text-slate-700">本日の送信履歴 0件</span>
          </span>
          <span id="submissionHistoryArrow" class="text-xs font-black text-slate-400">▼</span>
        </button>

        <div id="submissionHistoryPanel" class="hidden mt-3 border-t border-slate-100 pt-3">
          <div id="submissionHistoryList" class="max-h-64 overflow-y-auto no-scrollbar flex flex-col gap-2"></div>
          <p class="mt-2 text-[10px] text-slate-400 font-bold leading-relaxed">
            この履歴はこの端末内に当日分だけ保存されます。GAS通信の都合上、「送信処理完了」はスプレッドシート保存完了の確定通知ではありません。
          </p>
        </div>
      </section>

      <!-- スマホ：横スワイプ / PC：3列表示 -->
      <div
        id="expenseCards"
        class="expense-swipe-container no-scrollbar flex gap-3 overflow-x-auto snap-x snap-mandatory scroll-smooth pb-5 lg:grid lg:grid-cols-3 lg:overflow-visible"
      ></div>

      <div class="text-center text-[10px] font-bold text-slate-400 lg:hidden">
        横にスワイプして 経費2 / 経費3 を入力できます
      </div>
    </div>
  </main>

  <script>
    /***** 設定 *****/
    const SECRET_PASSCODE = "7140";

    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzK9E5kd5VsGC2nq_hG9fFZgwD43tbRyXHLmchtH_WWuggrfYBGiE1b-a83Lf-_tcnx/exec";

    const CARD_COUNT = 3;

    const DRAFT_FIELDS = [
      "payer",
      "paymentMethod",
      "expenseType",
      "content",
      "purchasePlace",
      "paymentDate",
      "amount",
      "memo"
    ];

    // 送信後も残す項目。カードを用途別テンプレートとして使えるようにする。
    const PRESERVE_AFTER_SUBMIT_FIELDS = [
      "payer",
      "paymentMethod",
      "expenseType",
      "content"
    ];

    const cardFiles = {};
    const cardSending = {};

    const SUBMISSION_HISTORY_KEY = "expense_submission_history_v1";
    const SUBMISSION_HISTORY_OPEN_KEY = "expense_submission_history_open";
    const SUBMISSION_HISTORY_MAX = 30;

    /***** ロック画面 *****/
    window.checkAutoPasscode = (val) => {
      const errorText = document.getElementById("passcodeError");
      errorText.classList.add("opacity-0");

      if (val.length === 4) {
        if (val === SECRET_PASSCODE) {
          document.getElementById("lockScreen").classList.add("opacity-0");
          setTimeout(() => {
            document.getElementById("lockScreen").classList.add("hidden");
          }, 500);
          sessionStorage.setItem("expense_unlocked", "true");
        } else {
          errorText.classList.remove("opacity-0");
          document.getElementById("passcodeInput").value = "";
        }
      }
    };

    if (sessionStorage.getItem("expense_unlocked") === "true") {
      document.getElementById("lockScreen").classList.add("hidden");
    }

    /***** 初期表示 *****/
    window.addEventListener("DOMContentLoaded", () => {
      renderExpenseCards();

      for (let cardId = 1; cardId <= CARD_COUNT; cardId++) {
        cardFiles[cardId] = [];
        cardSending[cardId] = false;
        restoreDraftInputs(cardId);
        setupDraftAutoSave(cardId);
        setupPaymentDateHint(cardId);
      }

      restoreSubmissionHistoryOpenState();
      renderSubmissionHistory();
      setupSwipeSnapAssist();
    });


    /***** 横スワイプ安定化 *****/
    function setupSwipeSnapAssist() {
      const container = document.getElementById("expenseCards");
      if (!container) return;

      let snapTimer = null;

      container.addEventListener("scroll", () => {
        if (window.matchMedia("(min-width: 1024px)").matches) return;

        clearTimeout(snapTimer);
        snapTimer = setTimeout(() => {
          snapToNearestCard(container);
        }, 120);
      }, { passive: true });
    }

    function snapToNearestCard(container) {
      const cards = Array.from(container.querySelectorAll(".expense-swipe-card"));
      if (cards.length === 0) return;

      const currentLeft = container.scrollLeft;
      let nearest = cards[0];
      let nearestDistance = Math.abs(cards[0].offsetLeft - currentLeft);

      cards.forEach(card => {
        const distance = Math.abs(card.offsetLeft - currentLeft);
        if (distance < nearestDistance) {
          nearest = card;
          nearestDistance = distance;
        }
      });

      container.scrollTo({
        left: nearest.offsetLeft,
        behavior: "smooth"
      });
    }


    /***** 送信履歴 *****/
    function todayKey() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function formatTime(date) {
      const hh = String(date.getHours()).padStart(2, "0");
      const mm = String(date.getMinutes()).padStart(2, "0");
      return `${hh}:${mm}`;
    }

    function loadSubmissionHistory() {
      try {
        const raw = localStorage.getItem(SUBMISSION_HISTORY_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed)
          ? parsed.filter(item => item && item.dateKey === todayKey()).slice(0, SUBMISSION_HISTORY_MAX)
          : [];
      } catch (err) {
        return [];
      }
    }

    function saveSubmissionHistory(items) {
      localStorage.setItem(SUBMISSION_HISTORY_KEY, JSON.stringify(items.slice(0, SUBMISSION_HISTORY_MAX)));
    }

    function addSubmissionHistory(item) {
      const items = loadSubmissionHistory();
      const now = new Date();

      items.unshift({
        dateKey: todayKey(),
        time: formatTime(now),
        timestamp: now.getTime(),
        cardId: item.cardId,
        status: item.status,
        statusType: item.statusType,
        expenseType: item.expenseType || "未選択",
        content: item.content || "",
        amount: item.amount || "",
        clientRequestId: item.clientRequestId || ""
      });

      saveSubmissionHistory(items);
      renderSubmissionHistory();
    }

    function renderSubmissionHistory() {
      const items = loadSubmissionHistory();
      const summary = document.getElementById("submissionHistorySummary");
      const list = document.getElementById("submissionHistoryList");

      if (summary) {
        summary.textContent = `本日の送信履歴 ${items.length}件`;
      }

      if (!list) return;

      if (items.length === 0) {
        list.innerHTML = `<div class="rounded-2xl bg-slate-50 border border-slate-100 p-3 text-xs font-bold text-slate-400">まだ送信履歴はありません。</div>`;
        return;
      }

      list.innerHTML = items.map(item => {
        const isError = item.statusType === "error";
        const statusClass = isError ? "text-red-600 bg-red-50 border-red-100" : "text-lime-700 bg-lime-50 border-lime-100";
        const amountText = item.amount ? ` / ¥${String(item.amount).replace(/\B(?=(\d{3})+(?!\d))/g, ",")}` : "";
        const contentText = item.content ? ` / ${escapeHtml(item.content).slice(0, 18)}` : "";
        const requestShort = item.clientRequestId ? item.clientRequestId.slice(-10) : "";

        return `
          <div class="rounded-2xl border p-3 ${statusClass}">
            <div class="flex items-center justify-between gap-2">
              <div class="text-xs font-black">${escapeHtml(item.time)}　経費${item.cardId}　${escapeHtml(item.status)}</div>
              <div class="text-[10px] font-bold opacity-70">${escapeHtml(requestShort)}</div>
            </div>
            <div class="mt-1 text-[11px] font-bold opacity-80">
              ${escapeHtml(item.expenseType)}${amountText}${contentText}
            </div>
          </div>
        `;
      }).join("");
    }

    function toggleSubmissionHistory() {
      const panel = document.getElementById("submissionHistoryPanel");
      const arrow = document.getElementById("submissionHistoryArrow");
      if (!panel) return;

      const willOpen = panel.classList.contains("hidden");
      panel.classList.toggle("hidden", !willOpen);
      localStorage.setItem(SUBMISSION_HISTORY_OPEN_KEY, willOpen ? "true" : "false");

      if (arrow) {
        arrow.textContent = willOpen ? "▲" : "▼";
      }
    }

    function restoreSubmissionHistoryOpenState() {
      const panel = document.getElementById("submissionHistoryPanel");
      const arrow = document.getElementById("submissionHistoryArrow");
      const isOpen = localStorage.getItem(SUBMISSION_HISTORY_OPEN_KEY) === "true";

      if (panel) panel.classList.toggle("hidden", !isOpen);
      if (arrow) arrow.textContent = isOpen ? "▲" : "▼";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    /***** カード描画 *****/
    function renderExpenseCards() {
      const root = document.getElementById("expenseCards");
      root.innerHTML = "";

      for (let cardId = 1; cardId <= CARD_COUNT; cardId++) {
        const card = document.createElement("section");
        card.className = "expense-swipe-card snap-start snap-always flex-none w-[calc(100vw-1.5rem)] lg:w-auto bg-white rounded-3xl shadow-sm border border-slate-200 p-3 flex flex-col gap-2.5";
        card.id = `expenseCard_${cardId}`;
        card.innerHTML = cardTemplate(cardId);
        root.appendChild(card);
      }
    }

    function cardTemplate(cardId) {
      return `
        <div class="flex items-start justify-between gap-3">
          <h2 class="font-extrabold text-lg text-slate-800">経費${cardId}</h2>
          <button
            type="button"
            onclick="resetCard(${cardId}, true)"
            class="text-[10px] font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded-lg shrink-0"
          >
            リセット
          </button>
        </div>

        <!-- 支払者 -->
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1">
            支払者 <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            id="payer_${cardId}"
            data-draft-field="payer"
            required
            placeholder="名前を入力"
            class="w-full bg-slate-50 border border-slate-200 px-3 py-3 rounded-xl font-bold text-sm text-slate-800 focus:ring-2 focus:ring-lime-400 outline-none"
          />
        </div>

        <!-- 支払方法 -->
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1">
            支払方法 <span class="text-red-500">*</span>
          </label>
          <select
            id="paymentMethod_${cardId}"
            data-draft-field="paymentMethod"
            required
            class="w-full bg-slate-50 border border-slate-200 px-3 py-3 rounded-xl font-bold text-sm text-slate-800 focus:ring-2 focus:ring-lime-400 outline-none"
          >
            <option value="立替|未返金">立替（未返金）</option>
            <option value="支払者名義立替|未返金">支払者名義立替（未返金）</option>
            <option value="LW資金支払い|対象外">LW資金支払い（LWのお金で支払ったもの・書類のみ提出）</option>
            <option value="立替|返金済み">立替（返金済み）</option>
            <option value="支払者名義立替|返金済み">支払者名義立替（返金済み）</option>
            <option value="その他|要確認">その他・要確認</option>
          </select>
        </div>

        <!-- 経費の種類 -->
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1">
            経費の種類 <span class="text-red-500">*</span>
          </label>
          <select
            id="expenseType_${cardId}"
            data-draft-field="expenseType"
            required
            class="w-full bg-slate-50 border border-slate-200 px-3 py-3 rounded-xl font-bold text-sm text-slate-800 focus:ring-2 focus:ring-lime-400 outline-none"
          >
            <option value="">選択してください</option>
            <option value="備品">備品</option>
            <option value="消耗品">消耗品</option>
            <option value="交通費">交通費</option>
            <option value="撮影関連">撮影関連</option>
            <option value="イベント関連">イベント関連</option>
            <option value="通信・アプリ">通信・アプリ</option>
            <option value="飲食">飲食</option>
            <option value="梱包・発送">梱包・発送</option>
            <option value="その他">その他</option>
            <option value="不明">不明</option>
          </select>
        </div>

        <!-- 内容 -->
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1">
            内容 <span class="text-red-500">*</span>
          </label>
          <textarea
            id="content_${cardId}"
            data-draft-field="content"
            rows="2"
            required
            placeholder="何のために買ったか。例：撮影用小物、梱包テープなど"
            class="w-full bg-slate-50 border border-slate-200 px-3 py-3 rounded-xl font-bold text-sm text-slate-800 focus:ring-2 focus:ring-lime-400 outline-none"
          ></textarea>
        </div>

        <!-- 任意項目 -->
        <div class="border-t border-slate-100 pt-3">
          <p class="text-[10px] font-black text-slate-400 tracking-widest mb-2">OPTIONAL</p>

          <div class="flex flex-col gap-3">
            <div>
              <label class="block text-xs font-bold text-slate-500 mb-1">購入先</label>
              <input
                type="text"
                id="purchasePlace_${cardId}"
                data-draft-field="purchasePlace"
                placeholder="ローソン、Amazon、ダイソーなど"
                class="w-full bg-slate-50 border border-slate-200 px-3 py-3 rounded-xl font-bold text-sm text-slate-800 focus:ring-2 focus:ring-lime-400 outline-none"
              />
            </div>

            <div>
              <label class="block text-xs font-bold text-slate-500 mb-1">支払日</label>
              <div class="relative">
                <input
                  type="date"
                  id="paymentDate_${cardId}"
                  data-draft-field="paymentDate"
                  class="w-full bg-slate-50 border border-slate-200 px-3 py-3 rounded-xl font-bold text-sm text-slate-800 focus:ring-2 focus:ring-lime-400 outline-none"
                />
                <span
                  id="paymentDateHint_${cardId}"
                  class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-sm font-bold text-slate-400"
                >年月日</span>
              </div>
            </div>

            <div>
              <label class="block text-xs font-bold text-slate-500 mb-1">支払金額</label>
              <input
                type="number"
                id="amount_${cardId}"
                data-draft-field="amount"
                inputmode="numeric"
                placeholder="入力"
                class="w-full bg-slate-50 border border-slate-200 px-3 py-3 rounded-xl font-bold text-sm text-slate-800 focus:ring-2 focus:ring-lime-400 outline-none"
              />
            </div>

            <div>
              <label class="block text-xs font-bold text-slate-500 mb-1">メモ</label>
              <textarea
                id="memo_${cardId}"
                data-draft-field="memo"
                rows="2"
                placeholder="補足があれば入力"
                class="w-full bg-slate-50 border border-slate-200 px-3 py-3 rounded-xl font-bold text-sm text-slate-800 focus:ring-2 focus:ring-lime-400 outline-none"
              ></textarea>
            </div>
          </div>
        </div>

        <!-- レシート写真 / PDF -->
        <div id="receiptBlock_${cardId}" class="border-t border-slate-100 pt-3 rounded-2xl">
          <label class="block text-xs font-bold text-slate-500 mb-1">
            レシート写真 <span class="text-red-500">*</span>
          </label>


          <!-- 1枚目：必須 -->
          <section class="bg-slate-50 border border-slate-200 rounded-2xl p-3">
            <div class="flex justify-between items-center mb-2">
              <p class="text-xs font-black text-slate-600">1枚目 <span class="text-red-500">*</span></p>
              <p id="fileStatus_${cardId}_1" class="text-[10px] font-bold text-slate-400">未選択</p>
            </div>

            <input type="file" id="cameraImage_${cardId}_1" accept="image/*" capture="environment" class="hidden" onchange="handleImageSelected(event, ${cardId}, 0)" />
            <input type="file" id="galleryImage_${cardId}_1" accept="image/*" class="hidden" onchange="handleImageSelected(event, ${cardId}, 0)" />

            <div class="grid grid-cols-2 gap-2">
              <button
                type="button"
                onclick="document.getElementById('cameraImage_${cardId}_1').click()"
                class="bg-slate-900 text-white py-3.5 rounded-2xl font-bold text-sm shadow-md active:scale-[0.99] transition-transform"
              >
                📷 撮影する
              </button>

              <button
                type="button"
                onclick="document.getElementById('galleryImage_${cardId}_1').click()"
                class="bg-white border border-slate-300 text-slate-700 py-3.5 rounded-2xl font-bold text-sm shadow-sm active:scale-[0.99] transition-transform"
              >
                🖼 写真から選ぶ
              </button>
            </div>

            <div id="imagePreviewBox_${cardId}_1" class="hidden mt-3">
              <img id="imagePreview_${cardId}_1" src="" class="w-full rounded-xl border border-slate-200 shadow-sm" />
            </div>
          </section>

          <!-- 2枚目：任意 -->
          <button
            type="button"
            id="showSecondReceiptButton_${cardId}"
            onclick="showSecondReceipt(${cardId})"
            class="w-full mt-2 bg-white border border-dashed border-slate-300 text-slate-500 py-3 rounded-2xl font-bold text-sm active:scale-[0.99] transition-transform"
          >
            ＋ 2枚目を追加
          </button>

          <section id="secondReceiptSection_${cardId}" class="hidden mt-2 bg-slate-50 border border-slate-200 rounded-2xl p-3">
            <div class="flex justify-between items-center mb-2">
              <p class="text-xs font-black text-slate-600">2枚目 <span class="text-slate-400">任意</span></p>
              <button type="button" onclick="removeSecondReceipt(${cardId})" class="text-[10px] font-bold text-slate-400 underline">
                取り消す
              </button>
            </div>

            <input type="file" id="cameraImage_${cardId}_2" accept="image/*" capture="environment" class="hidden" onchange="handleImageSelected(event, ${cardId}, 1)" />
            <input type="file" id="galleryImage_${cardId}_2" accept="image/*" class="hidden" onchange="handleImageSelected(event, ${cardId}, 1)" />

            <div class="grid grid-cols-2 gap-2">
              <button
                type="button"
                onclick="document.getElementById('cameraImage_${cardId}_2').click()"
                class="bg-slate-900 text-white py-3.5 rounded-2xl font-bold text-sm shadow-md active:scale-[0.99] transition-transform"
              >
                📷 撮影する
              </button>

              <button
                type="button"
                onclick="document.getElementById('galleryImage_${cardId}_2').click()"

    /***** 入力途中の自動保存 *****/
    function draftKey(cardId, field) {
      return `expense_draft_card_${cardId}_${field}`;
    }

    function setupDraftAutoSave(cardId) {
      DRAFT_FIELDS.forEach(field => {
        const el = document.getElementById(`${field}_${cardId}`);
        if (!el) return;

        el.addEventListener("input", () => {
          localStorage.setItem(draftKey(cardId, field), el.value);

          if (field === "payer") {
            localStorage.setItem("expense_payer", el.value);
          }

          if (field === "paymentMethod") {
            localStorage.setItem("expense_paymentMethod", el.value);
          }
        });

        el.addEventListener("change", () => {
          localStorage.setItem(draftKey(cardId, field), el.value);

          if (field === "payer") {
            localStorage.setItem("expense_payer", el.value);
          }

          if (field === "paymentMethod") {
            localStorage.setItem("expense_paymentMethod", el.value);
          }
        });
      });
    }

    function restoreDraftInputs(cardId) {
      const savedPayer = localStorage.getItem("expense_payer");
      const savedPaymentMethod = localStorage.getItem("expense_paymentMethod");

      DRAFT_FIELDS.forEach(field => {
        const el = document.getElementById(`${field}_${cardId}`);
        if (!el) return;

        const savedValue = localStorage.getItem(draftKey(cardId, field));

        if (savedValue !== null) {
          el.value = normalizeSavedPaymentValue(field, savedValue);
          return;
        }

        if (field === "payer" && savedPayer) {
          el.value = savedPayer;
        }

        if (field === "paymentMethod" && savedPaymentMethod) {
          el.value = normalizeSavedPaymentValue(field, savedPaymentMethod);
        }
      });
    }

    function normalizeSavedPaymentValue(field, value) {
      if (field !== "paymentMethod") return value;

      const allowed = [
        "立替|未返金",
        "立替|返金済み",
        "支払者名義立替|未返金",
        "支払者名義立替|返金済み",
        "LW資金支払い|対象外",
        "その他|要確認"
      ];

      if (allowed.includes(value)) return value;
      if (value === "立替") return "立替|未返金";
      if (value === "支払者名義立替") return "支払者名義立替|未返金";
      if (value === "会社支払い") return "LW資金支払い|対象外";
      if (value === "LW資金支払い") return "LW資金支払い|対象外";
      if (value === "不明") return "その他|要確認";
      if (value === "その他") return "その他|要確認";

      return "その他|要確認";
    }

    function clearDraftInputs(cardId, keepPreservedFields = true) {
      DRAFT_FIELDS.forEach(field => {
        if (keepPreservedFields && PRESERVE_AFTER_SUBMIT_FIELDS.includes(field)) {
          return;
        }

        localStorage.removeItem(draftKey(cardId, field));
      });
    }

    /***** 支払日ヒント *****/
    function setupPaymentDateHint(cardId) {
      const paymentDate = document.getElementById(`paymentDate_${cardId}`);
      if (!paymentDate) return;

      paymentDate.addEventListener("input", () => updatePaymentDateHint(cardId));
      paymentDate.addEventListener("change", () => updatePaymentDateHint(cardId));
      updatePaymentDateHint(cardId);
    }

    function updatePaymentDateHint(cardId) {
      const paymentDate = document.getElementById(`paymentDate_${cardId}`);
      const hint = document.getElementById(`paymentDateHint_${cardId}`);
      if (!paymentDate || !hint) return;

      if (paymentDate.value) {
        hint.classList.add("hidden");
      } else {
        hint.classList.remove("hidden");
      }
    }

    function normalizePaymentSelection(value) {
      if (value && value.includes("|")) {
        const parts = value.split("|");
        return {
          paymentMethod: parts[0] || "その他",
          refundStatus: parts[1] || "要確認"
        };
      }

      if (value === "立替") {
        return { paymentMethod: "立替", refundStatus: "未返金" };
      }

      if (value === "支払者名義立替") {
        return { paymentMethod: "支払者名義立替", refundStatus: "未返金" };
      }

      if (value === "会社支払い" || value === "LW資金支払い") {
        return { paymentMethod: "LW資金支払い", refundStatus: "対象外" };
      }

      if (value === "不明" || value === "その他") {
        return { paymentMethod: "その他", refundStatus: "要確認" };
      }

      return { paymentMethod: "その他", refundStatus: "要確認" };
    }

    /***** 入力チェック・一時通知 *****/
    function showGlobalToast(message, type = "success", duration = 1800) {
      const toast = document.getElementById("globalToast");
      if (!toast) return;

      toast.className = "fixed top-16 left-1/2 -translate-x-1/2 z-[80] rounded-2xl border px-4 py-3 text-sm font-extrabold shadow-lg max-w-[92vw] text-center transition-opacity duration-200";

      if (type === "success") {
        toast.classList.add("bg-lime-50", "border-lime-200", "text-lime-800");
      } else if (type === "error") {
        toast.classList.add("bg-red-50", "border-red-200", "text-red-700");
      } else if (type === "sending") {
        toast.classList.add("bg-blue-50", "border-blue-200", "text-blue-700");
      } else {
        toast.classList.add("bg-white", "border-slate-200", "text-slate-700");
      }

      toast.textContent = message;
      toast.classList.remove("hidden", "opacity-0");
      toast.classList.add("opacity-100");

      clearTimeout(window.__expenseToastTimer);
      window.__expenseToastTimer = setTimeout(() => {
        toast.classList.remove("opacity-100");
        toast.classList.add("opacity-0");
        setTimeout(() => toast.classList.add("hidden"), 220);
      }, duration);
    }

    function requiredElements(cardId) {
      return [
        document.getElementById(`payer_${cardId}`),
        document.getElementById(`paymentMethod_${cardId}`),
        document.getElementById(`expenseType_${cardId}`),
        document.getElementById(`content_${cardId}`)
      ].filter(Boolean);
    }

    function clearElementError(el) {
      if (!el) return;
      el.setCustomValidity("");
      el.classList.remove("border-red-400", "ring-2", "ring-red-100");
    }

    function markElementError(el) {
      if (!el) return;
      el.classList.add("border-red-400", "ring-2", "ring-red-100");
    }

    function clearReceiptError(cardId) {
      const block = document.getElementById(`receiptBlock_${cardId}`);
      if (!block) return;
      block.classList.remove("ring-2", "ring-red-100", "border", "border-red-200", "bg-red-50");
    }

    function markReceiptError(cardId) {
      const block = document.getElementById(`receiptBlock_${cardId}`);
      if (!block) return;
      block.classList.add("ring-2", "ring-red-100", "border", "border-red-200", "bg-red-50");
    }

    function clearCardValidation(cardId) {
      requiredElements(cardId).forEach(clearElementError);
      clearReceiptError(cardId);
    }

    function validateCardBeforeSubmit(cardId) {
      clearCardValidation(cardId);

      const content = document.getElementById(`content_${cardId}`);
      if (content && !content.value.trim()) {
        content.setCustomValidity("この項目を入力してください。");
      }

      const firstInvalid = requiredElements(cardId).find(el => !el.checkValidity());
      if (firstInvalid) {
        markElementError(firstInvalid);
        firstInvalid.scrollIntoView({ behavior: "smooth", block: "center", inline: "nearest" });
        setTimeout(() => firstInvalid.reportValidity(), 250);
        showGlobalToast(`経費${cardId}：未入力の項目があります`, "error", 1800);
        return false;
      }

      const files = getSelectedFiles(cardId);
      if (files.length === 0) {
        markReceiptError(cardId);
        const block = document.getElementById(`receiptBlock_${cardId}`);
        if (block) block.scrollIntoView({ behavior: "smooth", block: "center", inline: "nearest" });
        setCardStatus(cardId, "error", "レシート写真またはPDFを選択してください。");
        showGlobalToast(`経費${cardId}：レシート写真またはPDFが未選択です`, "error", 2000);
        return false;
      }

      return true;
    }

    /***** カード状態表示 *****/
    function setCardStatus(cardId, type, message) {
      const box = document.getElementById(`statusBox_${cardId}`);
      if (!box) return;

      box.className = "rounded-2xl border px-3 py-2 text-xs font-bold leading-relaxed";

      if (type === "idle" || type === "success" || type === "sending") {
        box.classList.add("hidden");
        box.textContent = "";
        return;
      }

      if (type === "error") {
        box.classList.add("bg-red-50", "border-red-100", "text-red-600");
      } else {
        box.classList.add("bg-slate-50", "border-slate-200", "text-slate-500");
      }

      box.textContent = message;
      box.classList.remove("hidden");
      box.classList.remove("animate-pop");
      void box.offsetWidth;
      box.classList.add("animate-pop");
    }

    function setCardSending(cardId, sending) {
      cardSending[cardId] = sending;

      const button = document.getElementById(`submitButton_${cardId}`);
      if (!button) return;

      button.disabled = sending;
      button.textContent = sending ? "送信中..." : `経費${cardId}を送信する`;
    }

    /***** 添付ファイル選択 *****/
    async function handleImageSelected(event, cardId, index) {
      const file = event.target.files[0];
      if (!file) return;

      if (!file.type.startsWith("image/")) {
        setCardStatus(cardId, "error", "画像ファイルを選択してください。");
        event.target.value = "";
        return;
      }

      clearPdfState(cardId, false);

      try {
        const base64 = await resizeImageToBase64(file, 1600, 0.78);
        cardFiles[cardId][index] = {
          base64,
          mimeType: "image/jpeg",
          fileRole: index === 0 ? "receipt_image_1" : "receipt_image_2",
          originalName: file.name || "receipt.jpg"
        };
      } catch (err) {
        const base64 = await fileToBase64(file);
        cardFiles[cardId][index] = {
          base64,
          mimeType: file.type || "image/jpeg",
          fileRole: index === 0 ? "receipt_image_1" : "receipt_image_2",
          originalName: file.name || "receipt.jpg"
        };
      }

      const preview = document.getElementById(`imagePreview_${cardId}_${index + 1}`);
      const previewBox = document.getElementById(`imagePreviewBox_${cardId}_${index + 1}`);
      const status = document.getElementById(`fileStatus_${cardId}_${index + 1}`);

      preview.src = cardFiles[cardId][index].base64;
      previewBox.classList.remove("hidden");

      if (status) {
        status.textContent = "選択済み";
        status.classList.remove("text-slate-400");
        status.classList.add("text-lime-700");
      }

      event.target.value = "";
      clearReceiptError(cardId);
      setCardStatus(cardId, "idle", "");
    }

    async function handlePdfSelected(event, cardId) {
      const file = event.target.files[0];
      if (!file) return;

      const isPdf = file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf");

      if (!isPdf) {
        setCardStatus(cardId, "error", "PDFファイルを選択してください。");
        event.target.value = "";
        return;
      }

      clearImageState(cardId, false);

      const base64 = await fileToBase64(file);
      cardFiles[cardId] = [{
        base64,
        mimeType: "application/pdf",
        fileRole: "receipt_pdf",
        originalName: file.name || "receipt.pdf"
      }];

      document.getElementById(`pdfFileName_${cardId}`).textContent = file.name || "receipt.pdf";
      document.getElementById(`pdfPreviewBox_${cardId}`).classList.remove("hidden");
      event.target.value = "";
      clearReceiptError(cardId);
      setCardStatus(cardId, "idle", "");
    }

    function clearImageState(cardId, resetInputs) {
      cardFiles[cardId] = [];

      ["cameraImage", "galleryImage"].forEach(prefix => {

    function clearPdfState(cardId, resetInputs) {
      if ((cardFiles[cardId] || []).some(file => file && file.mimeType === "application/pdf")) {
        cardFiles[cardId] = [];
      }

      const pdfInput = document.getElementById(`pdfFile_${cardId}`);

    function getSelectedFiles(cardId) {
      return (cardFiles[cardId] || []).filter(Boolean);
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;

        reader.readAsDataURL(file);
      });
    }

    function resizeImageToBase64(file, maxSize, quality) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => {
          const img = new Image();

          img.onload = () => {
            let width = img.width;
            let height = img.height;

            if (width > height && width > maxSize) {
              height = Math.round((height * maxSize) / width);
              width = maxSize;
            } else if (height > maxSize) {
              width = Math.round((width * maxSize) / height);
              height = maxSize;
            }

            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);

            resolve(canvas.toDataURL("image/jpeg", quality));
          };

          img.onerror = reject;
          img.src = reader.result;
        };

        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    /***** 送信 *****/
    async function submitCard(cardId) {
      if (cardSending[cardId]) {
        return;
      }

      const payer = document.getElementById(`payer_${cardId}`).value.trim();
      const paymentMethodValue = document.getElementById(`paymentMethod_${cardId}`).value;
      const paymentInfo = normalizePaymentSelection(paymentMethodValue);
      const paymentMethod = paymentInfo.paymentMethod;
      const refundStatus = paymentInfo.refundStatus;
      const expenseType = document.getElementById(`expenseType_${cardId}`).value;
      const content = document.getElementById(`content_${cardId}`).value.trim();
      const files = getSelectedFiles(cardId);
      const clientRequestId = createClientRequestId(cardId);

      if (!validateCardBeforeSubmit(cardId)) {
        return;
      }

      localStorage.setItem("expense_payer", payer);
      localStorage.setItem("expense_paymentMethod", paymentMethodValue);

      const payload = {
        payer,
        paymentMethod,
        refundStatus,
        expenseType,
        content,
        purchasePlace: document.getElementById(`purchasePlace_${cardId}`).value.trim(),
        paymentDate: document.getElementById(`paymentDate_${cardId}`).value,
        amount: document.getElementById(`amount_${cardId}`).value,
        memo: document.getElementById(`memo_${cardId}`).value.trim(),
        clientRequestId,

        // 新形式：GAS側で複数ファイルを保存するために使う
        files: files.map(file => ({
          base64: file.base64,
          mimeType: file.mimeType,
          fileRole: file.fileRole,
          originalName: file.originalName
        })),

        // 旧形式：GASを更新する前でも1ファイル目だけは従来通り処理できるように残す
        imageBase64: files[0].base64,
        mimeType: files[0].mimeType
      };

      setCardSending(cardId, true);
      setCardStatus(cardId, "idle", "");

      try {
        await fetch(GAS_WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        clearCardAfterSubmit(cardId);
        showGlobalToast(`経費${cardId}を送信しました`, "success", 1600);
        setCardStatus(cardId, "idle", "");
        addSubmissionHistory({
          cardId,
          status: "送信処理完了",
          statusType: "success",
          expenseType,
          content,
          amount: payload.amount,
          clientRequestId
        });

      } catch (err) {
        console.error(err);
        setCardStatus(cardId, "error", "送信に失敗しました。入力内容と添付ファイルは残しています。通信環境を確認して、もう一度お試しください。");
        showGlobalToast(`経費${cardId}：送信に失敗しました`, "error", 2200);
        addSubmissionHistory({
          cardId,
          status: "送信失敗",
          statusType: "error",
          expenseType,
          content,
          amount: payload.amount,
          clientRequestId
        });

      } finally {
        setCardSending(cardId, false);
      }
    }

    function createClientRequestId(cardId) {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      const ss = String(now.getSeconds()).padStart(2, "0");
      const rand = Math.random().toString(36).slice(2, 8);

      return `REQ-${y}${m}${d}-${hh}${mm}${ss}-C${cardId}-${rand}`;
    }

    function clearCardAfterSubmit(cardId) {
      // カードを用途別テンプレートとして使えるように、
      // 支払者・支払方法・経費の種類・内容は送信後も残す。
      const preservedValues = {};
      PRESERVE_AFTER_SUBMIT_FIELDS.forEach(field => {
        const el = document.getElementById(`${field}_${cardId}`);
        preservedValues[field] = el ? el.value : "";
      });

      // 金額・日付・購入先・メモ・添付だけは、次の経費と混ざると危ないので消す。
      ["purchasePlace", "paymentDate", "amount", "memo"].forEach(field => {
        const el = document.getElementById(`${field}_${cardId}`);
        if (el) el.value = "";
      });

      PRESERVE_AFTER_SUBMIT_FIELDS.forEach(field => {
        const el = document.getElementById(`${field}_${cardId}`);
        if (el) {
          el.value = preservedValues[field] || "";
          localStorage.setItem(draftKey(cardId, field), el.value);
        }
      });

      clearAllFileState(cardId);
      clearDraftInputs(cardId, true);
      updatePaymentDateHint(cardId);
    }

    function resetCard(cardId, askConfirm) {
      if (askConfirm && !confirm(`経費${cardId}の入力内容をリセットしますか？`)) return;

      const savedPayer = localStorage.getItem("expense_payer");
      const savedPaymentMethod = localStorage.getItem("expense_paymentMethod");

      DRAFT_FIELDS.forEach(field => {
        const el = document.getElementById(`${field}_${cardId}`);
        if (!el) return;

        if (field === "payer") {
          el.value = savedPayer || "";
        } else if (field === "paymentMethod") {
          el.value = normalizeSavedPaymentValue(field, savedPaymentMethod || "立替|未返金");
        } else {
          el.value = "";
        }
      });

      clearAllFileState(cardId);
      clearDraftInputs(cardId, true);
      clearCardValidation(cardId);
      setCardStatus(cardId, "idle", "");
      updatePaymentDateHint(cardId);
    }

    function resetAllCards() {
      if (!confirm("3つのカードの入力内容をすべてリセットしますか？")) return;

      for (let cardId = 1; cardId <= CARD_COUNT; cardId++) {
        resetCard(cardId, false);
      }
    }

    function clearAllFileState(cardId) {
      cardFiles[cardId] = [];

      [
        `cameraImage_${cardId}_1`,
        `galleryImage_${cardId}_1`,
        `cameraImage_${cardId}_2`,
        `galleryImage_${cardId}_2`,
        `pdfFile_${cardId}`
      ].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = "";
      });

      [1, 2].forEach(slot => {
        document.getElementById(`imagePreview_${cardId}_${slot}`).src = "";
        document.getElementById(`imagePreviewBox_${cardId}_${slot}`).classList.add("hidden");

        const status = document.getElementById(`fileStatus_${cardId}_${slot}`);
        if (status) {
          status.textContent = "未選択";
          status.classList.remove("text-lime-700");
          status.classList.add("text-slate-400");
        }
      });

      document.getElementById(`secondReceiptSection_${cardId}`).classList.add("hidden");
      document.getElementById(`showSecondReceiptButton_${cardId}`).classList.remove("hidden");

      document.getElementById(`pdfFileName_${cardId}`).textContent = "";
      document.getElementById(`pdfPreviewBox_${cardId}`).classList.add("hidden");
      document.getElementById(`pdfSection_${cardId}`).classList.add("hidden");
    }
  </script>
</body>
</html>
